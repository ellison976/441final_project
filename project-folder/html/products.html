<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | BHP Online Store</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="../images/logo.jpg" alt="Logo" width="120" height="60">
  </div>
  <nav class="nav-main">
    <a href="../index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html" class="cart-icon">
      <i class="fas fa-shopping-cart"></i>
      <span id="cart-count">0</span>
    </a>
    <a href="admin.html">Admin</a>
    <a href="about.html">About Us</a>
    <a href="support.html">Support</a>
    <a href="feedback.html">Feedback</a>
  </nav>
</header>

<div class="container">
  <h1>Our Products</h1>

  <!-- Login Area -->
  <div class="login-area">
    <input id="user" placeholder="Username">
    <input id="pwd" type="password" placeholder="Password">
    <button class="login-btn" onclick="tryLogin()">Login</button>
    <button class="logout-btn" onclick="logout()">Logout</button>  <!-- fixed: clearLoginCookie -> logout -->
  </div>

  <!-- Category Filter -->
  <div class="filter-bar">
    <div class="category-buttons">
      <button class="category-btn active" onclick="filterByCategory('all')">All</button>
      <button class="category-btn" onclick="filterByCategory('Mining')">Mining</button>
      <button class="category-btn" onclick="filterByCategory('Energy')">Energy</button>
      <button class="category-btn" onclick="filterByCategory('Metals')">Metals</button>
    </div>
  </div>

  <!-- Product Grid -->
  <div id="product-grid"></div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeEditModal()">&times;</span>
    <h2>Edit Product</h2>
    <form id="edit-form" onsubmit="updateProduct(event)">
      <input type="hidden" id="edit-id">
      <input id="edit-name" placeholder="Product Name">
      <input id="edit-price" type="number" placeholder="Price">
      <input id="edit-category" placeholder="Category">
      <textarea id="edit-desc" placeholder="Description"></textarea>
      <input id="edit-stock" type="number" placeholder="Stock">
      <input id="edit-image" placeholder="Image">
      <button type="submit">Save</button>
    </form>
  </div>
</div>

<!-- Product Details Modal -->
<div id="product-modal" class="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="closeProductModal()">&times;</span>
    <img id="modalProductImg" onclick="openLightbox()">
    <h3 id="modalProductName"></h3>
    <p>Category: <span id="modalProductCategory"></span></p>
    <p>Price: <span id="modalProductPrice"></span></p>
    <p>Stock: <span id="modalProductStock"></span></p>
    <p id="modalProductDesc"></p>
    <button class="add-to-cart-btn" onclick="addToCart(currentModalProductId); closeProductModal();">Add to Cart</button>
  </div>
</div>

<div class="toast-notification" id="toast-notification">
  <i class="fas fa-shopping-cart"></i>
  <span>Added to cart!</span>
</div>

<footer>
    <div class="footer-content">
        <div class="student-info">
            <p>Student Name: Ellison | Student ID: 243190737 | Class: IT1</p>
            <p>ICTWEB441 Student Project - BHP Ecommerce Website</p>
        </div>
        <div class="copyright">
            © 2026 ICTWEB441 Student Project - All Rights Reserved
        </div>
    </div>
</footer>

<script src="../js/global.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/products.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/session-storage.js"></script>
</body>
</html>
